<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>영화 리뷰</title>
    <link rel="stylesheet" href="./templates/styles/reset.css" />
    <link rel="stylesheet" href="./templates/styles/main.css" />
    <link rel="stylesheet" href="./templates/styles/tab.css" />
    <link rel="stylesheet" href="./templates/styles/thumbnail.css" />
  </head>
  <body>
    <div id="app">
      <header>
        <div class="background-container">
          <div class="overlay" aria-hidden="true"></div>
          <div class="top-rated-container">
            <h1 class="logo">
              <img src="./templates/images/logo.png" alt="MovieList" />
            </h1>
            <div class="top-rated-movie">
              <div class="rate">
                <img src="./templates/images/star_empty.png" class="star" />
                <span class="rate-value"></span>
              </div>
              <div class="title"></div>
              <button class="primary detail">자세히 보기</button>
            </div>
          </div>
        </div>
      </header>

      <form action="submit" id="search-form">
        <input type="text" id="search-input" />
        <button>전송</button>
      </form>

      <main>
        <section>
          <h2 id="thumbnail-title">지금 인기 있는 영화</h2>
          <ul class="thumbnail-list"></ul>
        </section>
      </main>

      <footer class="footer">
        <p>&copy; 우아한테크코스 All Rights Reserved.</p>
        <p><img src="./templates/images/woowacourse_logo.png" width="180" /></p>
      </footer>
    </div>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
